<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portafolio Anderson</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body style="background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px;">

    <div class="card-semana" style="max-width: 400px; width: 100%; background: white; border-top: 6px solid #e94560; padding: 30px; border-radius: 15px; text-align: center;">
        <div class="nro-sem">A</div>
        <h2 style="margin-bottom: 10px; color: #1a1a2e;">Iniciar Sesión</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 25px;">Acceso administrativo</p>
        
        <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="usuario" placeholder="Usuario" required style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" required style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            
            <button type="submit" class="btn-t" style="background: #e94560; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Entrar
            </button>
        </form>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee;">
            <p style="font-size: 0.85rem; color: #444;">
                ¿No tienes cuenta? <br>
                <a href="#" style="color: #e94560; font-weight: bold; text-decoration: none;">Regístrate aquí</a>
            </p>
        </div>
        <br>
        <a href="index.html" style="text-decoration: none; color: #777; font-size: 0.8rem;">← Volver al inicio</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('usuario').value;
            if(user.toLowerCase() === 'anderson') {
                alert('¡Bienvenido! Redirigiendo al panel de control...');
                window.location.href = 'index.html?admin=true'; 
            } else {
                alert('Usuario o contraseña no válidos');
            }
        });
    </script>
</body>
</html>
