<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UPLA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #0f172a, #1e293b);
    color:white;
}

.login-box{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.login-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.link{
    margin-top:10px;
    display:block;
    color:#93c5fd;
    cursor:pointer;
    font-size:14px;
}

#mensaje{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>Iniciar Sesión</h2>

    <!-- LOGIN -->
    <form onsubmit="return login()">
        <input type="text" id="user" placeholder="Usuario">
      <div class="password-box">
    <input type="password" id="password" placeholder="Contraseña">
    <span class="toggle-password" onclick="mostrarPassword()">
        👁️
    </span>
</div>
        <label style="font-size:12px;">
            <input type="checkbox" onclick="togglePass()"> Mostrar contraseña
        </label>

        <button type="submit">Ingresar</button>
    </form>

    <!-- MENSAJE -->
    <div id="mensaje"></div>

    <!-- REGISTRO LINK -->
    <span class="link" onclick="mostrarRegistro()">¿No tienes cuenta? Regístrate</span>

    <!-- REGISTRO -->
    <div id="registroBox" style="display:none;">
        <h3 style="margin-top:15px;">Registro</h3>
        <input type="text" id="newUser" placeholder="Nuevo usuario">
        <input type="password" id="newPass" placeholder="Nueva contraseña">
        <button onclick="registrar()">Registrarse</button>
    </div>

</div>

<script>

// mensajes bonitos
function mostrarMensaje(texto, tipo){
    let msg = document.getElementById("mensaje");

    msg.innerText = texto;
    msg.style.padding = "10px";
    msg.style.borderRadius = "8px";

    if(tipo === "ok"){
        msg.style.background = "#16a34a";
    } else {
        msg.style.background = "#dc2626";
    }
}

// mostrar contraseña
function togglePass(){
    let pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
}

// mostrar registro
function mostrarRegistro(){
    document.getElementById("registroBox").style.display = "block";
}

// registrar usuario
function registrar(){
    let user = document.getElementById("newUser").value;
    let pass = document.getElementById("newPass").value;

    if(user === "" || pass === ""){
        mostrarMensaje("Completa los campos", "error");
        return;
    }

    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    mostrarMensaje("Registro exitoso", "ok");
}

// login
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let savedUser = localStorage.getItem("user");
    let savedPass = localStorage.getItem("pass");

    // admin
    if(u === "admin" && p === "1234"){
        localStorage.setItem("rol","admin");
        window.location.href = "index.html";
    }
    // usuario registrado
    else if(u === savedUser && p === savedPass){
        localStorage.setItem("rol","usuario");
        window.location.href = "index.html";
    }
    else{
        mostrarMensaje("Datos incorrectos", "error");
    }

    return false;
}

</script>

</body>
</html>
