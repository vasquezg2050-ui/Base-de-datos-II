<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portafolio Anderson</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body style="background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div class="card-login" style="background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center;">
        <h2 style="color: #1a1a2e; margin-bottom: 15px;">Iniciar Sesión</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Selecciona tu cuenta registrada</p>
        
        <div id="listaCuentas" style="margin-bottom: 20px; text-align: left;"></div>

        <form id="loginForm">
            <input type="password" placeholder="Contraseña de admin" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px;">
            <button type="submit" id="btnEntrar" disabled style="width: 100%; background: #e94560; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Entrar al Panel</button>
        </form>

        <a href="registro.html" style="color: #e94560; font-size: 0.8rem; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
    </div>

    <script>
        function cargarCuentas() {
            const contenedor = document.getElementById('listaCuentas');
            let cuentas = JSON.parse(localStorage.getItem('misCuentas')) || [];
            if (cuentas.length > 0) {
                cuentas.forEach((c, index) => {
                    contenedor.innerHTML += `
                        <div onclick="seleccionar(${index})" id="user-${index}" style="display: flex; align-items: center; padding: 10px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                            <div style="width: 30px; height: 30px; background: #e94560; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 10px; font-weight: bold;">${c.inicial}</div>
                            <div>
                                <p style="font-size: 0.8rem; font-weight: bold; margin: 0; color: #333;">${c.nombre}</p>
                            </div>
                        </div>`;
                });
            }
        }
        function seleccionar(index) {
            document.getElementById('btnEntrar').disabled = false;
            document.querySelectorAll('[id^="user-"]').forEach(el => el.style.borderColor = '#eee');
            document.getElementById('user-' + index).style.borderColor = '#e94560';
        }
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Redirigimos al INDEX oficial
            window.location.href = 'index.html?admin=true';
        });
        window.onload = cargarCuentas;
    </script>
</body>
</html>
