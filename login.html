<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#0f172a;
}
.box{
    background:white;
    padding:25px;
    border-radius:10px;
    width:280px;
    text-align:center;
}
input,button{
    width:100%;
    margin:10px 0;
    padding:10px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login Admin</h2>
    <form onsubmit="return login()">
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button type="submit">Ingresar</button>
    </form>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        localStorage.setItem("admin","true");
        window.location.href = "index.html";
    } else {
        alert("Incorrecto");
    }
    return false;
}
</script>

</body>
</html>
