<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Portafolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px;">

    <div class="card-semana" style="max-width: 400px; width: 100%; background: white; border-top: 6px solid #e94560; padding: 30px; border-radius: 15px; text-align: center;">
        <h2 id="tituloRegistro" style="margin-bottom: 20px; color: #1a1a2e;">Paso 1: Correo</h2>
        
        <form id="formRegistro" style="display: flex; flex-direction: column; gap: 15px;">
            <div id="paso1">
                <input type="email" id="regCorreo" placeholder="Introduce tu correo Google/UPLA" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
                <button type="button" onclick="irAlPaso2()" class="btn-t" style="width: 100%; background: #1a1a2e; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">Continuar</button>
            </div>

            <div id="paso2" style="display: none;">
                <input type="text" id="regNombre" placeholder="Nombres y Apellidos" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px;">
                <input type="password" id="regPass" placeholder="Crea tu contraseña" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px;">
                <button type="submit" class="btn-t" style="width: 100%; background: #e94560; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Finalizar Registro</button>
            </div>
        </form>

        <br>
        <a href="login.html" style="text-decoration: none; color: #777; font-size: 0.8rem;">← Volver al Login</a>
    </div>

    <script>
        function irAlPaso2() {
            const correo = document.getElementById('regCorreo').value;
            if(correo.includes('@')) {
                document.getElementById('paso1').style.display = 'none';
                document.getElementById('paso2').style.display = 'block';
                document.getElementById('tituloRegistro').innerText = 'Paso 2: Datos';
            } else {
                alert('Por favor, ingresa un correo válido.');
            }
        }

        document.getElementById('formRegistro').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('regNombre').value;
            const correo = document.getElementById('regCorreo').value;

            const nuevoUsuario = {
                nombre: nombre,
                email: correo,
                inicial: nombre.charAt(0).toUpperCase(),
                color: '#e94560'
            };

            let cuentas = JSON.parse(localStorage.getItem('misCuentas')) || [];
            cuentas.push(nuevoUsuario);
            localStorage.setItem('misCuentas', JSON.stringify(cuentas));

            alert('Cuenta creada exitosamente.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
