<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Portafolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .card { max-width: 400px; width: 100%; background: #ffffff; border-top: 6px solid #e94560; padding: 30px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-next { background: #1a1a2e; color: white; }
        .btn-finish { background: #e94560; color: white; }
        #msgExito { color: #28a745; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="titulo" style="margin-bottom: 20px; color: #1a1a2e;">Paso 1: Correo</h2>
        
        <p id="msgExito">¡Registro exitoso! Redirigiendo...</p>

        <form id="formRegistro">
            <div id="paso1">
                <input type="email" id="regCorreo" placeholder="Introduce tu correo" required>
                <button type="button" onclick="irAlPaso2()" class="btn btn-next">Continuar</button>
            </div>

            <div id="paso2" style="display: none;">
                <input type="text" id="regNombre" placeholder="Nombres y Apellidos" required>
                <input type="password" id="regPass" placeholder="Crea tu contraseña" required>
                <button type="submit" class="btn btn-finish">Finalizar Registro</button>
            </div>
        </form>

        <br>
        <a href="login.html" style="text-decoration: none; color: #777; font-size: 0.8rem;">← Volver al Login</a>
    </div>

    <script>
        function irAlPaso2() {
            const correo = document.getElementById('regCorreo').value;
            if(correo.includes('@')) {
                document.getElementById('paso1').style.display = 'none';
                document.getElementById('paso2').style.display = 'block';
                document.getElementById('titulo').innerText = 'Paso 2: Datos';
            }
        }

        document.getElementById('formRegistro').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('regNombre').value;
            const correo = document.getElementById('regCorreo').value;

            const nuevoUsuario = {
                nombre: nombre,
                email: correo,
                inicial: nombre.charAt(0).toUpperCase()
            };

            let cuentas = JSON.parse(localStorage.getItem('misCuentas')) || [];
            cuentas.push(nuevoUsuario);
            localStorage.setItem('misCuentas', JSON.stringify(cuentas));

            // Mostrar mensaje en la página en lugar de alert
            document.getElementById('msgExito').style.display = 'block';
            document.getElementById('paso2').style.display = 'none';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
