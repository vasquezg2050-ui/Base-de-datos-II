<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Portafolio BD II</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container {
            background: #202124; width: 100%; max-width: 400px;
            padding: 30px; border-radius: 16px; border-top: 6px solid #e94560;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #ffffff; margin-bottom: 20px; }
        .form-registro { display: flex; flex-direction: column; gap: 15px; }
        .form-registro input {
            background: #2d2e31; border: 1px solid #3c4043; padding: 12px;
            border-radius: 8px; color: #ffffff; outline: none;
        }
        .btn-registrar {
            background: #e94560; color: white; border: none; padding: 14px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-registrar:hover { background: #ff5e78; }
        .volver { display: block; margin-top: 20px; color: #8ab4f8; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Crear Perfil</h2>
        <form class="form-registro" id="formRegistro">
            <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
            <input type="email" id="correo" placeholder="Correo Electrónico" required>
            <input type="text" id="codigo" placeholder="Código de Estudiante" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-registrar">Guardar Registro</button>
        </form>
        <a href="login.html" class="volver">Volver al Login</a>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombreFull = document.getElementById('nombre').value;
            const nuevoUsuario = {
                nombre: nombreFull,
                email: document.getElementById('correo').value,
                inicial: nombreFull.charAt(0).toUpperCase(),
                color: '#4285f4'
            };

            let cuentas = JSON.parse(localStorage.getItem('misCuentas')) || [];
            cuentas.push(nuevoUsuario);
            localStorage.setItem('misCuentas', JSON.stringify(cuentas));

            alert("Registro guardado con éxito.");
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
