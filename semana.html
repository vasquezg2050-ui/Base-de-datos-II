<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajos por Semana</title>

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #172554, #111827);
    background-size: 400% 400%;
    animation: fondo 15s ease infinite;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: 50px auto;
}
    #lista {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}
    .titulo-box{
    width: 100%;
    max-width: 850px;
    margin: 0 auto 40px;
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}
    .titulo-box h1{
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* TARJETAS */
.trabajo-card{
    width: 100%;
    max-width: 850px;

    background: rgba(255,255,255,0.08);
    border-radius: 18px;

    padding: 25px;
    margin-bottom: 20px;

    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transition: 0.3s ease;
}

.trabajo-card:hover{
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.25);
}

/* BOTONES */
.card-body{
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

h1{
    text-align: center;
    margin-bottom: 20px;
}

.card{
    background: #1e293b;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

.btn-ver{
    display: inline-block;
    background: linear-gradient(45deg,#38bdf8,#0ea5e9);
    padding: 10px 18px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(56,189,248,0.5);
}

.btn-ver:hover{
    transform: scale(1.07);
    box-shadow: 0 10px 20px rgba(14,165,233,0.4);
}

.btn-eliminar{
    background: #ef4444;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(239,68,68,0.4);
}

.btn-eliminar:hover{
    background: #dc2626;
}

.btn-volver{
    display: incline-block;
    margin-bottom: 25px;
    margin-left: 25px;
    padding: 12px 24px;

    background: linear-gradient(45deg,#2563eb,#3b82f6);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(37,99,235,0.4);
}

.btn-volver:hover{
    transform: scale(1.08);
    box-shadow: 0 15px 30px rgba(37,99,235,0.6);
}
.trabajo-card{
animation: aparecer 0.6s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform: translateY(30px);
    }

    to{
        opacity:1;
        transform: translateY(0);
    }
}
  @keyframes fondo{
    0%{
        background-position: 0% 50%;
    }

    50%{
        background-position: 100% 50%;
    }

    100%{
        background-position: 0% 50%;
    }
}
</style>
</head>
<body>

<div class="container">
 <button class="btn-volver" onclick="volver()">⬅ Volver</button>
<div class="titulo-box">
   <h1 id="titulo">Semana</h1>
</div>    
<div id="lista"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
    "https://gekfhjbteilxldcptjhr.supabase.co",
    "sb_publishable_Eg0_hi4tgCYK9UqyWzIWwg_AyuglRCc"
);

// obtener semana
let params = new URLSearchParams(window.location.search);
let semana = params.get("sem");

document.getElementById("titulo").innerText = "Trabajos - Semana " + semana;

// cargar trabajos
async function cargar(){
    const { data, error } = await supabaseClient
        .from("trabajos")
        .select("*")
        .eq("semana", semana);

    if(error){
        console.log(error);
        return;
    }

    if(data.length === 0){
        document.getElementById("lista").innerHTML = `
       <div class="trabajo-card" style="text-align:center;">
       <h3>📂 No hay trabajos aún</h3>
    <p>Pronto se subirán nuevos archivos.</p>
</div>
`;
        return;
    }

    data.forEach(tr => {
        let div = document.createElement("div");
        div.className = "trabajo-card";

        div.innerHTML = `
        <div class= "card-header">
        <h3>${tr.titulo}</h3>
        </div>
        
        <div class= "card-body">
        <a href="${tr.link}" target="_blank" class="btn-ver">📄 Ver PDF</a>
        
        ${localStorage.getItem("rol") === "admin" 
            ? `<br><button class="btn-eliminar" onclick="eliminar(${tr.id})">Eliminar</button>` 
            : ""}
        </div>
        `;

        document.getElementById("lista").appendChild(div);
    });
}

// eliminar
async function eliminar(id){
    await supabaseClient
        .from("trabajos")
        .delete()
        .eq("id", id);

    location.reload();
}

// volver
function volver(){
     if(document.referrer){
        window.history.back();
    } else {
        window.location.href = "/Base-de-datos-II/index.html";
    }
}

cargar();
</script>

</body>
</html>
